<!doctype html>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
    (() => {
        const isGithub = location.hostname.endsWith('github.io');
        const first = location.pathname.split('/').filter(Boolean)[0];
        const base = isGithub ? `/${first}` : '';
        const target = `${base}/deliverable-generator.html?src=ig`;
        location.replace(target);
    })();
</script>
<noscript>
    <p>移動できない場合：<a href="/deliverable-generator.html?src=ig">診断へ</a></p>
</noscript>
